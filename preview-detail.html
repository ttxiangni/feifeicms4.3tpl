<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视在线播放 - 详情页面预览</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: white; padding: 1rem; text-align: center; }
        nav { background-color: #444; padding: 0.5rem; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; }
        nav li { margin: 0 1rem; }
        nav a { color: white; text-decoration: none; }
        .detail { padding: 2rem; background: white; margin: 1rem; border-radius: 8px; }
        .poster { float: left; margin-right: 2rem; }
        .poster img { width: 200px; }
        .episodes { clear: both; padding-top: 2rem; }
        .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; }
        .episode { background: #eee; padding: 0.5rem; text-align: center; border-radius: 4px; }
        .comments { padding: 2rem; }
        .comment { background: white; margin: 1rem 0; padding: 1rem; border-radius: 8px; }
        footer { background-color: #333; color: white; text-align: center; padding: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>影视在线播放</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">首页</a></li>
            <li><a href="#">电影</a></li>
            <li><a href="#">电视剧</a></li>
            <li><a href="#">综艺</a></li>
            <li><a href="#">动漫</a></li>
            <li><a href="#">搜索</a></li>

    <section class="detail">
        <div class="poster">
            <img src="https://via.placeholder.com/200x300" alt="海报">
        </div>
        <h2>电影标题</h2>
        <p>导演：某某</p>
        <p>主演：某某、某某</p>
        <p>类型：动作、冒险</p>
        <p>地区：中国</p>
        <p>年份：2023</p>
        <p>简介：这是一个精彩的电影，讲述了...</p>
        <a href="preview-play.html">开始播放</a>
    </section>
    <section class="episodes">
        <h3>选集</h3>
        <div class="episode-grid">
            <div class="episode">第1集</div>
            <div class="episode">第2集</div>
            <!-- 更多集 -->
        </div>
    </section>
    <section class="comments">
        <h3>评论区</h3>
        <div class="comment">
            <p><strong>用户1：</strong> 很好看！</p>
        </div>
        <div class="comment">
            <p><strong>用户2：</strong> 推荐给大家。</p>
        </div>
    </section>
    <footer>
        <p>&copy; 2023 影视在线播放模板</p>

</html>
