<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视在线播放模板 - 首页预览</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: white; padding: 1rem; text-align: center; }
        nav { background-color: #444; padding: 0.5rem; }
        nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; }
        nav li { margin: 0 1rem; }
        nav a { color: white; text-decoration: none; }
        .hero { background-color: #007bff; color: white; padding: 2rem; text-align: center; }
        .section { padding: 2rem; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .movie-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .movie-card img { width: 100%; height: 150px; object-fit: cover; }
        .movie-card h3 { margin: 0.5rem; font-size: 1rem; }
        footer { background-color: #333; color: white; text-align: center; padding: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>影视在线播放</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">首页</a></li>
            <li><a href="#">电影</a></li>
            <li><a href="#">电视剧</a></li>
            <li><a href="#">综艺</a></li>
            <li><a href="#">动漫</a></li>
            <li><a href="#">搜索</a></li>
        </ul>
    </nav>
    <section class="hero">
        <h2>热门推荐</h2>
        <p>发现最新最热门的影视内容</p>
    </section>
    <section class="section">
        <h2>热播推荐</h2>
        <div class="movie-grid">
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x150" alt="电影1">
                <h3>电影标题1</h3>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x150" alt="电影2">
                <h3>电影标题2</h3>
            </div>
            <!-- 更多电影卡片 -->
        </div>
    </section>
    <section class="section">
        <h2>最近更新</h2>
        <ul>
            <li>电视剧A - 第10集</li>
            <li>电影B - 更新</li>
            <!-- 更多更新 -->
        </ul>
    </section>
    <footer>
        <p>&copy; 2023 影视在线播放模板</p>
    </footer>
</body>
</html>
